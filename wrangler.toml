name = "easybookvoucher"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
workers_dev = false
preview_urls = false

# Dashboard'da elle eklenen secret'ları (TWILIO_*, SUPABASE_SERVICE_ROLE_KEY vb.)
# deploy sırasında SİLME. `wrangler deploy` varsayılan olarak config'te olmayan
# vars/secret'ları kaldırır; Cloudflare Workers Builds hattı `--keep-vars`
# kullanmadığından bu ayar tüm deploy yollarında sırların korunmasını sağlar.
keep_vars = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[routes]]
pattern = "bodrumdayiz.com.tr"
custom_domain = true
zone_name = "bodrumdayiz.com.tr"

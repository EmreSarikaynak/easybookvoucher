name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: https://yjxsnudpiknohrxxgyra.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqeHNudWRwaWtub2hyeHhneXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MTgyMjEsImV4cCI6MjA4NTE5NDIyMX0.GyOxvGai6ebeG9hDnRyq0VgPS6igJd5DKwC3fJ6njWo
          # VAPID public key — build sırasında bundle'a gömülür (browser tarafı için zorunlu)
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BJ8GG0Jo0NNNRvqWEpMALXfItd0f6LUAwzheM4YiymcAm0jPIqzri-PrwkcuqdVZ7YEPlllQOv2cAI0UBdo505M

      # Runtime secrets (SUPABASE_SERVICE_ROLE_KEY, TWILIO_*) Cloudflare Dashboard'da
      # Workers → easybookvoucher → Variables and Secrets — bkz. .env.example
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --message: Cloudflare sürüm geçmişinde hangi commit olduğunu gösterir
          command: deploy --keep-vars --message "github-${{ github.sha }}"

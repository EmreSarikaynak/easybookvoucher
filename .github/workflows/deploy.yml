name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: https://yjxsnudpiknohrxxgyra.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqeHNudWRwaWtub2hyeHhneXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MTgyMjEsImV4cCI6MjA4NTE5NDIyMX0.GyOxvGai6ebeG9hDnRyq0VgPS6igJd5DKwC3fJ6njWo

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --keep-vars
